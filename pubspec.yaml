name: chef_sync_suite
description: "A premium enterprise-grade Restaurant Management SaaS application built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.1.0
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  intl: ^0.20.3
  uuid: ^4.3.3
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.6.0
  badges: ^3.1.2
  firebase_core: ^4.11.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.6.0
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/icons/
